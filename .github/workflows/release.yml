name: release

# Push a tag like v0.2.0 to cut a release. The firmware is built and hardware-
# tested locally (pico-sdk 2.1.1, arm-gcc 14.2) and the resulting lens.uf2 is
# committed, so CI does NOT recompile it -- it smoke-tests the JS toolchain,
# checks the committed binary is not stale, and publishes it as a GitHub Release.
# GitHub auto-attaches the source tarball + zip.
on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.2.0) for a manual release'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to compare commit times

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JS smoke test
        run: |
          npm install --no-audit --no-fund
          node compiler/validate.js
          node tools/build_web.js

      - name: Check committed firmware is present and not stale
        run: |
          test -f lens.uf2 || { echo "lens.uf2 missing at repo root -- build it locally and commit it"; exit 1; }
          uf2_t=$(git log -1 --format=%ct -- lens.uf2)
          src_t=$(git log -1 --format=%ct -- runtime CMakeLists.txt ComputerCard.h)
          if [ -n "$src_t" ] && [ "$src_t" -gt "$uf2_t" ]; then
            echo "lens.uf2 is older than the latest runtime / CMakeLists change."
            echo "Rebuild it locally (cmake --build build) and commit it before tagging."
            exit 1
          fi
          ls -lh lens.uf2

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Lens ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            lens.uf2
