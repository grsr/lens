           border-radius: 5px; padding: 4px 12px; font: inherit; cursor: pointer; }

  .num  { color: #d9b08c; }
  .head { color: #9fd08a; }

<main>
  <pre id="hl" aria-hidden="true"></pre>
  <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off">; one sine, main knob picks the pitch across two octaves starting at C3.
;   knob-main = pitch (C3 to B4)     audio-out-1 = sine
;
; (spread knob-main 24) divides the knob into 24 semitone buckets. Each bucket
; is about 170 ADC units wide, comfortably outside the framework's knob jitter,
; so the pitch sits stably on each semitone. C3 env-resolves to MIDI 48;
; the positional pitch on sine is in MIDI domain (no auto-spread).
(patch
  (&lt;- (audio-out :1) (sine (add C3 (spread (knob :main) 24)))))
</textarea>
</main>
<footer>edits compile as you type &middot; send = play it now &middot; save to card = survives power-off &middot; Chrome/Edge only (WebMIDI) &middot; <a href="https://grsr.github.io/lens/docs/loupe.html" target="_blank">loupe docs</a></footer>

<script>const EXAMPLES = {"discreet-system":"; after Eno's Discreet Music, though the similarity mostly stops at the name ;)\n; two scored melodic lines sent to external oscillators and slopes; their audio returns\n; are summed through a feedback delay.\n;   cv-out 1/2 = pitch     pulse-out 1/2 = trigger     audio-in 1/2 = voices back\n;   audio-out 1/2 = dry voice + echo     knob-main = feedback     knob-x = tempo     knob-y = voice 2 drift\n;   patch: cv-out 1/2 -> SineSquare 1/2 v/oct; pulse-out 1/2 -> Slope 1/2 trig;\n;          Slope 1/2 -> audio-in 1/2 (so the voices return for the feedback delay);\n;          audio-out 1/2 -> Mix.\n(patch\n  (def feedback (knob :main))\n  (def tempo    (knob :x))\n  (def drift    (bipolar (knob :y)))                    ; noon = locked; either side drifts the voices apart\n  (def master (clock :tempo tempo))\n  (def b2     (follow master :mult 1 :drift drift))\n\n  ; _ = rest, ~ = tie (holds previous pitch)\n  (def t1 (score '(Eb5 _  F5 _ _ ~ ~ ~   C5 Ab4 _ _ ~ ~ ~ ~\n                   Eb4 _ _ _ ~ ~ ~ ~   Ab4 _ _ ~ ~ ~ ~ ~)))\n  (def t2 (score '(Db5 Eb5 _ _ ~ ~ ~ ~   F4 _ _ _ ~ ~ ~ ~\n                   Ab4 _ _ ~ ~ ~ ~ ~   F5 Ab5 Bb5 Ab5 _ ~ ~ ~)))\n\n  (def delaybuf (audio :seconds 1.7))\n  (def echo (tap delaybuf :amount VMAX :span))   ; fixed full-length delay, no glide\n\n  (<- (cv-out :1 :v-oct) (step (t1 :notes) :trig master))\n  (<- (pulse-out :1) (onsets (t1 :rhythm) :trig master))\n  (<- (cv-out :2 :v-oct) (step (t2 :notes) :trig b2))\n  (<- (pulse-out :2) (onsets (t2 :rhythm) :trig b2))\n\n  ; sum the dry voices with the attenuated echo, low-pass, then soft-clip into the\n  ; audio range before writing. the delay buffer is signed 12-bit and its write wraps\n  ; (not clamps), so an over-range value would flip polarity and crackle; saturate\n  ; keeps the feedback loop in range with a tape-like knee instead.\n  (def wet (lpf :in (add (mix (audio-in :1) (audio-in :2))\n                         (vca echo feedback))\n  B4, 24 semitones)\n;   knob-x    = vibrato depth (CCW = none, CW = wide)\n;   knob-y    = vibrato speed (~0 to ~30 Hz)\n;   audio-out-1 = sine + vibrato\n;\n; :hz X accepts a literal Hz value or a stream. A streamed :hz reads the value\n; directly as Hz, so (spread knob-y 30) gives 0..29 Hz across the knob's travel.\n(patch\n  (def pitch (add C3 (spread (knob :main) 24)))\n  (<- (audio-out :1) (sine pitch :pm (sine :hz (spread (knob :y) 30)) :depth (knob :x))))\n","hello-seq":"; a 4-note minor arpeggio stepping once per master tick.\n;   knob-x = tempo     audio-out-1 = arpeggio voice\n;   cv-out-1 = pitch     pulse-out-1 = trigger\n(patch\n  (def master (clock :tempo (knob :x)))\n  (def melody (tape '(C3 Eb3 G3 Bb3)))\n\n  (def voice  (step melody))\n  (<- (cv-out :1 :v-oct) voice)\n  (<- (pulse-out :1) (trig))\n  (<- (audio-out :1) (sine voice)))\n","hello":"; one sine, main knob picks the pitch across two octaves starting at C3.\n;   knob-main = pitch (C3 to B4)     audio-out-1 = sine\n;\n; (spread knob-main 24) divides the knob into 24 semitone buckets. Each bucket\n; is about 170 ADC units wide, comfortably outside the framework's knob jitter,\n; so the pitch sits stably on each semitone. C3 env-resolves to MIDI 48;\n; the positional pitch on sine is in MIDI domain (no auto-spread).\n(patch\n  (<- (audio-out :1) (sine (add C3 (spread (knob :main) 24)))))\n","just-a-kick":"; a dedicated kick drum module with full CV and knob control.\n;   knob-main = decay (cv-bi-2 adds)     knob-x = drive     knob-y = pitch sweep\n;   switch-z  = OCTAVE (down = C1, middle = C2, up = C3)\n;   cv-bi-1   = pitch offset (+-12 semitones)     pulse-in-1 or pulse-in-2 = trigger\n;   audio-out 1/2 = kick (mono)     cv-out-1 = pitch as v/oct\n;   cv-out-2  = inverted amp envelope (for sidechaining: high at rest, dips on kick)\n;   pulse-out-1 = trigger thru     pulse-out-2 = /2 of trigger\n;   patch: pulse-in-1 <- a clock (e.g. 4-voltages or another pulse source);\n;          audio-out-1 -> Mix; cv-out-2 -> VCA on a bass you want to duck under the kick.\n(patch\n  (def OCTAVE-base (squint '(C1 C2 C3) (switch :z)))   ; switch pos down/mid/up = C1/C2/C3\n  (def pitch       (add OCTAVE-base (spread (cv-in :1 :bipolar) OCTAVE)))  ; +-12 semis\n  (def decay       (add (knob :main) (cv-in :2 :bipolar) :sat))\n  (def drive       (knob :x))\n  (def sweep       (knob :y))\n  (def clk-fall (normal (pulse-in :1) (onsets four-on-floor)))\n  (def trig     (or clk-fall (pulse-in :2)))\n\n  (def voice (kick :midi pitch :decay decay :drive drive :sweep sweep :trig trig))\n\n  (def amp     (envelope :trig trig :decay decay))\n  (def ducker  (sub VMAX amp))\n\n  (<- (audio-out :1) voice)\n  (<- (audio-out :2) voice)\n  (<- (cv-out :1 :v-oct) pitch)\n  (<- (cv-out :2)    ducker)\n  (<- (pulse-out :1) trig)\n  (<- (pulse-out :2) (toggle trig)))\n","meta-turing-machine":"; like turing-machine.loupe but hunts the transformations applied to a fixed tune, not the notes.\n;   knob-main = program mutation rate     knob-x = tempo     knob-y = tune mutation rate\n;   switch up = voice 2 drifts against voice 1 (phasing); down/mid = locked\n;   cv-out 1/2 = plain tune / transformed     pulse-out 1/2 = trigger\n;   patch: cv-out 1/2 -> SineSquare 1/2 v/oct; pulse-out 1/2 -> Slope 1/2 trig;\n;          Slope 1/2 -> Mix. audio-out 1/2 carry bench sines as a dry monitor.\n\n; the four ops; each maps a note to a note\n(def same  (fn (:n) n))\n(def up   (fn (:n) (transpose n 12)))\n(def flip  (fn (:n) (sub 120 n)))\n(def down (fn (:n) (transpose n -12)))\n(def ops   (lens same up flip down))        ; a lens turns byte k on a tape into op k\n\n(patch\n  (def master (clock :tempo (knob :x)))\n  (def bar    (follow master :div 4))\n  (def drift  (follow master :mult 15 :div 16))   ; voice-2 tune clock, 1 beat slower per 16: phases in/out\n  (def tune (tape '(C4 E4 G4 B4)))\n  (def prog (tape ops '(same up flip down)))\n\n  ; keep-or-replace: rewrite the program tape each bar, the tune each beat\n  (<- prog (if (chance (knob :main) :trig bar) (step prog :trig bar) (random :trig bar)) :trig bar)\n  (<- tune (if (chance (knob :y)) (step tune) (snap (add C3 (spread (random) 25)) :scale minor)))\n\n  (def v1     (step tune))\n  ; voice 2 = the program transform applied to a note. switch up: read the tune on the\n  ; slow drift clock so the voices slide in/out of phase; else the locked v1. Select the\n  ; NOTE (cheap) so there is a single transform chain, not one per branch.\n  (def v2note (if (gt (switch :z) VMID) (step tune :trig drift) v1))\n  (def v2     ((thru ops (step prog :trig bar)) v2note))\n  (def trig (trig master))\n  (<- (cv-out :1 :v-oct) v1)\n  (<- (cv-out :2 :v-oct) v2)\n  (<- (pulse-out :1) trig)\n  (<- (pulse-out :2) trig)\n  ; bench-monitor sines so audio-out 1/2 carry the two voices dry when no external V/oct is wired.\n  (<- (audio-out :1) (sine v1))\n  (<- (audio-out :2) (sine v2))\n  (<- (led :0)       (step prog :trig bar))   ; show current op index directly\n  (<- (led :5)       (envelope :trig trig :decay 500)))   ; tempo blink\n","rungler":"; benjolin (after rob hordijk): two oscillators cross-modulate through a rungler.\n; the rungler is a shift register clocked by osc2, fed osc1's comparator bit XORed\n; back on itself (a nonlinear feedback shift register). its stepped voltage is the\n; CV that re-tunes both oscillators, so the whole thing chases its own tail.\n; for the full rungler sound, run audio-out-1 into the workshop filter with the rungle\n; (cv-out-1) on its cutoff, then add a touch of FM and resonance: that filtered, resonant\n; sweep is where it really sings.\n;   knob-x = osc1 pitch (the audible voice)\n;   knob-y = osc2 pitch = rungler CLOCK rate (turn down for a slow stepped sequence, up for audio-rate chaos)\n;   knob-main = rungler amount (0 = stable drone, up = the rungle sweeps the pitches into chaos)\n;   switch up = freeze the rungler: the current pattern locks into a repeating loop\n; jacks (patch into the workshop filter):\n;   audio-out-1 = both oscs mixed     -> filter audio in\n;   cv-out-1    = rungle voltage (stepped)  -> filter cutoff (add resonance + a little FM)\n;   cv-out-2    = rungle voltage (smoothed) -> filter cutoff for gliding sweeps instead\n;   audio-out-2 = osc1 alone          -> filter the oscillators separately, or use as a mod source\n;   pulse-out-1 = rungler clock (osc2 edges) -> sync the rest of the system\n;   audio-in-1  = optional analog feedback: patch the filter out back here and it joins the\n;                 rungler's data, folding the analog filter into the digital chaos (inert if unpatched)\n(patch\n  (def amount (spread (knob :main) 13))              ; rungler depth: 0..12 semitones per rungle level\n  (def p1 (add 30 (spread (knob :x) 49)))            ; osc1 pitch: notes 30..78 (the audible voice)\n  (def p2 (spread (knob :y) 73))                     ; osc2 = clock: notes 0..72 (~8 Hz slow .. ~660 Hz audio)\n\n  ; the rungler register, seeded so it never starts on a fixed point\n  (def reg (tape '(0 1 1 0 1 0 0 1)))\n\n  ; rungler DAC: the three most-recent stages, binary weighted (0..7), scaled to full scale\n  (def rungle3 (add (add (mul (tap reg :amount 1) 4)\n                         (mul (tap reg :amount 2) 2))\n                    (tap reg :amount 3)))\n  (def rungle  (div (mul rungle3 VMAX) 7))           ; 0..7 -> VMIN..VMAX\n\n  ; the rungle voltage is the CV that drives both oscillators' pitch (independent base pitches)\n  (def fm (mul rungle3 amount))\n  (def pitch1 (add p1 fm))\n  (def pitch2 (add p2 fm))\n\n  ; one phasor per voice: its ramp drives the rungler timing (comparator + clock) and,\n  ; via :phase, the audio triangles below, so they stay phase-coherent\n  (def o1 (phasor pitch1))                           ; ramp: osc1 comparator source\n  (def o2 (phasor pitch2))                           ; ramp: rungler clock\n\n  ; nonlinear feedback shift register: recirculate the oldest stage, and while running\n  ; XOR in fresh data (osc1 comparator XOR the filter return). switch UP stops the fresh\n  ; data, so the register just loops its 8 bits = the current pattern locks. clocked by osc2.\n  (def c1   (mask (gt o1 VMID) 1))                   ; osc1 ramp split at its midpoint\n  (def fb   (mask (gt (audio-in :1) VMID) 1))        ; filter feedback bit (0 when unpatched)\n  (def lock (mask (gt (switch :z) VMID) 1))          ; switch up = freeze: lock the pattern into a loop\n  (def run  (sub 1 lock))\n  ; din = comparator XOR oldest-stage XOR a tail term. running tail = fb; locked tail = c1,\n  ; which cancels c1 so din = oldest-stage (pure recirculation = the pattern loops). the lock\n  ; rides the fb side so the comparator's feedback path keeps its exact depth (no added z-1).\n  (def din (xor (xor c1 (tap reg :amount 8))\n                (add (mul run fb) (mul lock c1))))\n  (<- reg din :trig o2)\n\n  (<- (audio-out :1) (mix (triangle :phase o1) (triangle :phase o2)))\n  (<- (audio-out :2) (triangle :phase o1))           ; osc1 alone\n  (<- (cv-out :1)    (cv rungle))                    ; rungle voltage, stepped\n  (<- (cv-out :2)    (cv (slew rungle :rate 500)))   ; rungle voltage, smoothed (gliding cutoff)\n  (<- (pulse-out :1) (trig o2))                      ; rungler clock, one pulse per osc2 cycle\n  (<- (led :0)       rungle))\n","turing-machine":"; a loop of notes that slowly rewrites itself; main controls mutation rate.\n;   knob-main = mutation (CW = locked loop, CCW = pure random)\n;   knob-x = tempo (used when pulse-in-1 is unpatched)\n;   knob-y = active length\n;   pulse-in-1 = external clock (patch one in and it takes over from knob-x)\n;   cv-out-1 = pitch     pulse-out-1 = clock trigger\n;   patch: cv-out-1 -> SineSquare v/oct; pulse-out-1 -> Slope trig; Slope -> Mix.\n(patch\n  (def master (normal (pulse-in :1) (clock :tempo (knob :x))))\n  (def loop (tape '(C3 Eb3 G3 Bb3 C4 Bb3 G3 Eb3)))\n\n  ; knob-y picks the active loop length, 1..(len loop) cells: 1 = single-cell\n  ; repeat, full = the whole loop. Spread the knob across the tape's own length.\n  (def length (add 1 (spread (knob :y) (len loop))))\n\n  ; keep the current step, or replace with a random note in a 2-OCTAVE window from C3.\n  ; (random) spans 0..4095, far above MIDI range; the window keeps replacements musical.\n  (<- loop (if (chance (knob :main))\n               (step loop :len length)\n               (snap (add C3 (spread (random) 25)) :scale minor))\n           :len length)\n\n  (<- (cv-out :1 :v-oct) (step loop :len length))\n  (<- (pulse-out :1) (trig))\n  (<- (led :0)       (step loop :len length)))\n","utility-pair":"; two utilities in a chain: a wavefolder feeding a lopass gate.\n;   audio-out 1 = the input, wavefolded. audio-out 2 = that fold through a\n;   plucked lopass gate. standalone it sings on its own; patch jacks to take over.\n; jacks (all normalled, so it works with nothing patched):\n;   audio-in 1  source to fold        (normalled to an internal sine)\n;   audio-in 2  lopass-gate input     (normalled to the folded signal)\n;   pulse-in 1  ping the lopass gate  (normalled to an internal four-on-floor)\n;   cv-out 2 = the folder's random voltage   pulse-out 2 = its /2 divider\n; knobs: main = fold drive, x = tempo, y = pluck length.\n; swap either (use ...) for another file from\n; https://github.com/grsr/lens/tree/main/patches/utility-pair to try a different utility.\n(use utility-pair/lopass-gate)\n(use utility-pair/wavefolder)\n(patch\n  (def beat (clock :tempo (knob :x)))\n  (def src  (normal (audio-in :1) (sine :hz 110)))\n  (def wf   (wavefolder :in src :drive (knob :main) :trig beat :steps 4))\n  (<- (audio-out :1) (wf :out))\n  (<- (cv-out :2)    (wf :random))\n  (<- (pulse-out :2) (wf :clock))\n\n  (def lpg-in (normal (audio-in :2) (wf :out)))\n  ; internal four-on-floor always plucks; an external pulse adds hits on top.\n  (def ping   (max (onsets four-on-floor beat) (pulse-in :1)))\n  (<- (audio-out :2) (lopass-gate :in lpg-in :ping ping :decay (knob :y)))\n\n  (<- (led :0) (knob :main))\n  (<- (led :3) (knob :y)))\n"};
</script>
<script>// web/app.js: Lens patch editor UI.
// Inlined by tools/build_web.js after the bundled compiler (global `Lens`)
// and embedded example patches (global `EXAMPLES`).
// Requires a secure context for WebMIDI (https or localhost).
"use strict";

const $ = (id) => document.getElementById(id);
const editor = $("editor"), hl = $("hl"), statusEl = $("status"), picker = $("picker");
const btnConnect = $("connect"), btnSend = $("send"), btnSaveCard = $("savecard");
const btnOpen = $("open"), btnSave = $("save"), filePick = $("filepick");

let midiOut = null, midiIn = null, ackWaiter = null;
let snapshot = null;        // last good compile's bytes

const say = (msg, cls) => { statusEl.textContent = msg; statusEl.className = cls || ""; };

window.addEventListener("error", (e) => say(e.message, "err"));

// ---- syntax highlighting -------------------------------------------------------
const TOKEN = /(;[^\n]*)|(:[\w?*+-]+)|(\(|\))|(-?\d[\w.]*)|([^\s();]+)|(\s+)/g;
const escHtml = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;");

function highlight(src) {
  let out = "", depth = 0, head = false, m;
  TOKEN.lastIndex = 0;
  while ((m = TOKEN.exec(src))) {
    const [, cmt, kw, paren, num, sym, ws] = m;
    if (cmt)      { out += '<span class="cmt">' + escHtml(cmt) + "</span>"; head = false; }
    else if (kw)  { out += '<span class="kw">' + escHtml(kw) + "</span>"; head = false; }
    else if (paren) {
      if (paren === "(") { out += '<span class="p' + (depth % 5) + '">(</span>'; depth++; head = true; }
      else { depth = Math.max(0, depth - 1); out += '<span class="p' + (depth % 5) + '">)</span>'; head = false; }
    }
    else if (num) { out += '<span class="num">' + escHtml(num) + "</span>"; head = false; }
    else if (sym) { out += head ? '<span class="head">' + escHtml(sym) + "</span>" : escHtml(sym); head = false; }
    else out += ws;
  }
  return out + "\n";
}

function paint() { try { hl.innerHTML = highlight(editor.value); } catch (_) {} }
const syncScroll = () => { hl.scrollTop = editor.scrollTop; hl.scrollLeft = editor.scrollLeft; };

// (use FILE) loader: fetch patches by URL, cache recursively before compile.
const useCache = new Map();
const scanUses = (t) => { const re = /\(\s*use\s+([^\s)]+)/g, out = []; let m; while ((m = re.exec(t))) out.push(m[1]); return out; };

async function pullUses(relpath) {
  for (const cand of [relpath, relpath + ".loupe"]) {
    const url = new URL("../" + cand, location.href).href;
    if (useCache.has(cand)) return;
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      const t = await r.text();
      useCache.set(cand, t);
      for (const u of scanUses(t)) await pullUses("patches/" + u);
      return;
    } catch (_) {}
  }
}

// loadFile(relpath): returns text string or null. relpath is repo-root-relative.
// Checks the fetched (use ...) cache, then the files bundled at build time
// (prelude.loupe), so the expander can read the prelude in the browser.
const loadFile = (relpath) => {
  if (useCache.has(relpath)) return useCache.get(relpath);
  if (typeof __LENS_FILES !== "undefined" && __LENS_FILES[relpath]) return __LENS_FILES[relpath];
  return null;
};

async function refresh() {
  try {
    const text = editor.value;
    for (const u of scanUses(text)) await pullUses("patches/" + u);
    const ast        = Lens.read(text);
    const expanded   = Lens.expand(ast, { loadFile });
    const lowered    = Lens.lower(expanded);
    const scheduled  = Lens.schedule(lowered);
    snapshot = Lens.encode(scheduled, lowered);
    const nodeCount = lowered.slots ? lowered.slots.length : 0;
    say(nodeCount + " nodes · " + snapshot.length + " B"
        + (midiOut ? " · " + midiOut.name : " · not connected"), "ok");
  } catch (e) {
    snapshot = null;
    say(e.message, "err");
  }
  btnSend.disabled = btnSaveCard.disabled = !(snapshot && midiOut);
}

function loadText(text) { editor.value = text; paint(); refresh(); }

// ---- WebMIDI ------------------------------------------------------------------
async function connect() {
  if (!navigator.requestMIDIAccess) { say("this browser has no WebMIDI (use Chrome or Edge over http/https, not a file:// page)", "err"); return; }
  try {
    const midi = await navigator.requestMIDIAccess({ sysex: true });
    midiOut = [...midi.outputs.values()].find(p => /lens|workshop|music thing/i.test(p.name)) || null;
    midiIn  = [...midi.inputs.values()].find(p => /lens|workshop|music thing/i.test(p.name)) || null;
    if (!midiOut || !midiIn) { say("no card found (looked for a MIDI device matching lens/workshop/music thing)", "err"); return; }
    midiIn.onmidimessage = (ev) => {
      const m = Lens.parse([...ev.data]);
      if (m && ackWaiter) { const w = ackWaiter; ackWaiter = null; w(m); }
    };
    btnConnect.textContent = "connected";
    refresh();
  } catch (e) { say("midi: " + e.message, "err"); }
}

const recv = (ms = 1500) => new Promise((res, rej) => {
  const t = setTimeout(() => { ackWaiter = null; rej(new Error("no reply from the card")); }, ms);
  ackWaiter = (m) => { clearTimeout(t); res(m); };
});

async function writePatch() {
  for (let t = 0; t < 4; t++) {
    midiOut.send([...Lens.frame(Lens.CMD.WRITE_STATE, snapshot)]);
    const m = await recv();
    if (m.cmd === Lens.CMD.ACK) return;
    if (m.cmd === Lens.CMD.NACK && m.payload[1] === 0x06) { await new Promise(r => setTimeout(r, 150)); continue; }
    throw new Error("card refused the patch (NACK " + (m.payload[1] || "?") + ")");
  }
  throw new Error("card stayed busy");
}

async function send() {
  if (!snapshot || !midiOut) return;
  btnSend.disabled = true;
  try { await writePatch(); say("sent · playing", "ok"); }
  catch (e) { say(e.message, "err"); }
  btnSend.disabled = !(snapshot && midiOut);
}

async function saveToCard() {
  if (!snapshot || !midiOut) return;
  btnSaveCard.disabled = true;
  try {
    await writePatch();
    await new Promise(r => setTimeout(r, 700));
    midiOut.send([...Lens.frame(Lens.CMD.SAVE_STATE)]);
    const m = await recv(3000);
    if (m.cmd !== Lens.CMD.ACK) throw new Error("save refused");
    say("saved · card is rebooting, reconnect in a moment", "ok");
    btnConnect.textContent = "connect"; midiOut = midiIn = null;
  } catch (e) { say(e.message, "err"); }
  refresh();
}

// ---- wire up ------------------------------------------------------------------
let timer = null;
editor.addEventListener("input", () => { paint(); clearTimeout(timer); timer = setTimeout(refresh, 250); });
editor.addEventListener("scroll", syncScroll);
btnConnect.addEventListener("click", connect);
btnSend.addEventListener("click", send);
btnSaveCard.addEventListener("click", saveToCard);
btnOpen.addEventListener("click", () => filePick.click());
filePick.addEventListener("change", () => {
  const f = filePick.files[0]; if (!f) return;
  f.text().then(t => { picker.value = ""; loadText(t); });
});
btnSave.addEventListener("click", () => {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([editor.value], { type: "text/plain" }));
  a.download = (picker.value || "patch").replace(/.*\//, "").replace(/\.loupe$/, "") + ".loupe";
  a.click();
});

picker.appendChild(new Option("examples…", ""));
for (const name of Object.keys(EXAMPLES)) picker.appendChild(new Option(name, name));
picker.addEventListener("change", () => {
  const text = EXAMPLES[picker.value];
  if (text !== undefined) loadText(text);
});

paint();
refresh();
</script>
